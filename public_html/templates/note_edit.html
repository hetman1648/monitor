<html>
<head>
   <title>Control</title>
   <link rel="stylesheet" href="site.css" type="text/css"/>
</head>
<body class="PageBODY">
{ITEMPLATE=header.html}
<!-- BEGIN error -->
<table width="100%"><tr><td align="center" style="background-color:#FFCCCC; color:red;">{error_message}<br><br></td></tr></table>
<!-- END error -->
<!--BEGIN success -->
<table width="100%"><tr><td align="center" style="background-color:#CCFFCC; color:green;">{success_message}<br><br></td></tr></table>
<!--END success -->

<!-- BEGIN edit_note_form -->
<form name="record" action="note_edit.php{query_note_id}" method="POST" style="display:inline;">
<input type="hidden" name="operation" value="{operation}">
<input type="hidden" name="task_id" value="{task_id}">
<table cellpadding="2" width="100%">
	<tr>
		<td class="FormHeaderTD" colspan="2"><font class="FormHeaderFONT">Note</font></td>
	</tr>
	<tr>
		<td class="FieldCaptionTD" width="150px">Task</td>
		<td class="DataTD"><a href="edit_task.php?task_id={task_id}">{task_title}</a></td>
	</tr>
	<tr>
		<td class="FieldCaptionTD" width="150px">Note Title *</td>
		<td class="DataTD">
			<input type=text size='40' name='note_title' value='{note_title}' style="width:100%;">
		</td>
	</tr>
	<tr>
		<td class="FieldCaptionTD">Note Description *</td>
		<td class="DataTD">
			<textarea type="text" name="note_description" cols="80" rows="10" style="width:100%;height:180px;">{note_description}</textarea>
		</td>
	</tr>
	<tr>
		<td class="FieldCaptionTD">Allow Edit</td>
		<td class="DataTD">
			<!-- BEGIN allow_edit_groups -->
			<input type="checkbox" name="allow_edit_{group}" value="1" {group_checked} {disabled}>{group_description} &nbsp;&nbsp;
			<!-- END allow_edit_groups -->
		</td>
	</tr>
	<tr>
		<td class="FieldCaptionTD">Allow View</td>
		<td class="DataTD">
			<!-- BEGIN allow_view_groups -->
			<input type="checkbox" name="allow_view_{group}" value="1" {group_checked} {disabled}>{group_description} &nbsp;&nbsp;
			<!-- END allow_view_groups -->
		</td>
	</tr>
	<!-- BEGIN note_info -->
	<tr>
		<td class="FieldCaptionTD">Added By</td>
		<td class="DataTD">{created_user_name} &nbsp; {date_added}</td>
	</tr>
	<tr>
		<td class="FieldCaptionTD">Modified</td>
		<td class="DataTD">{modified_user_name} &nbsp; {date_last_modified}</td>
	</tr>
	<!-- END note_info -->
	<tr>
		<td colspan=2 class="DataTD">
			<!-- BEGIN save_button_block -->
			<input type="submit" name="update" value="{save_button}">
			<!-- END save_button_block -->
			<!-- BEGIN delete_button_block -->
			<input type="submit" name="delete" value="Delete" onClick="document.record.operation.value='delete';return confirm('Do you want to delete this note?');">
			<!-- END delete_button_block -->			
			<input type="submit" name="cancel" value="Cancel" onClick="document.record.operation.value='cancel';">
		</td>
	</tr>
</table>
</form>
<!-- END edit_note_form -->
</body>
</html>
