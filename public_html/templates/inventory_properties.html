<html>

<head>
<title>
	Control
</title>
<link rel="stylesheet" href="site.css" type="text/css"/>
<script language="javascript">
	function DeleteProperty(num)
	{
		if(confirm('Are you sure you want to delete this Property?') && (num > -1))
		{
			document.location="inventory_property.php?operation=delete&property_id=" + num;
		}
	}

	function clearFilter()
	{
		document.frmFilter.inv_selected.value = "";
		document.frmInventoryProperty.filterclause.value = "-1";
		//document.frmFilter.office_selected.value = "";
		//document.frmFilter.user_selected.value = "";
	}
</script>
</head>

<body class="PageBODY">
{ITEMPLATE=header.html}
<table cellpadding="0" cellspacing="0" width=100% border="0">
	<tr align="center">
		<td>
			<div id="menu_body">
			<table>
			 	<tr>
			  		<td nowrap>
						<a href="inventory.php" class="DataTD">Inventories</a>
			  		</td>
			  		<td nowrap>
						|&nbsp;<a href="inventory_types.php" class="DataTD">Types</a>
			  		</td>
			  		<td nowrap>
						|&nbsp;<a href="inventory_offices.php" class="DataTD">Offices</a>
			  		</td>
			  		<td nowrap>
						|&nbsp;<a href="inventory_report.php" class="DataTD">Report</a>
					</td>
			 	</tr>
			</table>
			</div>
		</td>
	</tr>
	<tr align="center">
		<td>
			<font class="DataFONT">{pages_navigator}</font>
		</td>
	</tr>
	<tr align="center">
		<td>
			<table class="FormTABLE" border="0" width=70%>
			<form name="frmInventoryProperty" action="inventory_property.php" method="POST">
			<input type="hidden" name="filterclause" value="{filterclause}">
				<tr>
			    	<td class="FormHeaderTD" colspan="{colpan}">
					     	<font class="FormHeaderFONT">Inventory Properties List</font>
					</td>
				</tr>
				<!--
				<tr>
			    	<td class="ColumnTD" colspan="{colpan}">
						     <font class="ColumnFONT">Details</font>
					</td>
				</tr>
				-->
				<tr>
			    	<td class="DataRow1">
						<CENTER>Name</CENTER>
					</td>
			    	<td class="DataRow1">
						<CENTER>Value</CENTER>
					</td>
					<td class="DataRow1">
						<CENTER>Description</CENTER>
					</td>
					<td class="DataRow1">
						<CENTER>Inventory</CENTER>
					</td>
					<!-- BEGIN title_operation -->
					<td class="DataRow1" colspan="2">
						<CENTER>Operations</CENTER>
					</td>
					<!-- END title_operation -->
				</tr>
				<!-- BEGIN property_orders -->
				<tr>
			    	<td class="{colorrow}" align="left" nowrap>
			                       {inventory_property_name}
					</td>
			    	<td class="{colorrow}" align="left" nowrap>
			      			       {inventory_property_value}
					</td>
			    	<td class="{colorrow}" align="left" nowrap>
			      			       {inventory_property_desc}
					</td>
			    	<td class="{colorrow}" align="left" nowrap>
			      			       {inventory_title}
					</td>
					<!-- BEGIN control_operation -->
			    	<td width="40" class="{colorrow}" align="center">
			      	        <a href="inventory_property.php?operation=view&property_id={property_id}">Edit</a>
			      	</td>
			    	<td class="{colorrow}" align="center">
			      	        <a href="javascript:DeleteProperty({property_id})">Delete</a>
			        </td>
			        <!-- END control_operation -->
				</tr>
				<!-- END property_orders -->
				<tr height="50" valign="bottom">
					<td align="right" colspan="{colpan}">
						<input type="submit" name="submit" value="Add">
					</td>
				</tr>
			 </form>
			</table>
		</td>
		<td valign="top">
			<br><br>
			<div align="center">
			<form name="frmFilter" action="inventory_properties.php" method="POST">
			<input type="hidden" name="operation" value="filter">
			<table border="0">
				<tr>
					<td align="right">
						Select inventory:
					</td>
					<td>
						<select name="inv_selected" style="width:150px" align="center">
							<option value="">--- Inventory ---</option>
							{inventories}
						</select>
					</td>
				</tr>
				<!--
				<tr>
					<td align="right">
						Select office:
					</td>
					<td>
						<select name="office_selected" style="width:150px">
							<option value="">------- Office -------</option>
							{offices}
						</select>
					</td>
				</tr>
				<tr>
					<td align="right">
						Select user:
					</td>
					<td>
						<select name="user_selected" style="width:150px">
							<option value="">------- User -------</option>
							{users}
						</select>
					</td>
				</tr>
				-->
				<tr>
					<td align="center" colspan="2">
						<input type="submit" value=" Filter " name="submit">&nbsp;
						<input type="button" value=" Clear " onclick="clearFilter()">
					</td>
				</tr>
			</table>
			</form>
			</div>
		</td>
	</tr>
</table>

</body>

</html>
