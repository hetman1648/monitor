<html>

<head>
<title>
	Control
</title>
<link rel="stylesheet" href="site.css" type="text/css"/>
<script language="javascript" src="./scripts/calendar.js"></script>
<script language="javascript">
	function DeleteInventory(num)
	{
		if(confirm('Are you sure you want to delete this Inventory item?'))
		{
			document.frmInventoryEdit.operation.value = "delete";
			document.frmInventoryEdit.idnumber.value = num;
			document.frmInventoryEdit.submit();
		}
	}
	function SaveInventory(num)
	{
		if (num==-1)
		{
			document.frmInventoryEdit.operation.value ="add";
		}
		else
		{
			document.frmInventoryEdit.operation.value ="update";
		}

		document.frmInventoryEdit.idnumber.value = num;
		document.frmInventoryEdit.submit();
	}
</script>
</head>
